name: Check football prediction freshness

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Run model tests
        run: npm test

      - name: Fail when published data is stale
        run: npm run check:freshness
        env:
          MAX_DATA_AGE_MINUTES: "240"
